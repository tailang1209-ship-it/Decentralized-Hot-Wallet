kind = "mobile"
previewPath = "/"
title = "去中心化热钱包"
version = "1.0.0"
id = "artifacts/crypto-wallet"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20227

[services.development]
run = "pnpm --filter @workspace/crypto-wallet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crypto-wallet", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/crypto-wallet", "run", "serve" ]

[services.env]
PORT = "20227"
BASE_PATH = "/"
